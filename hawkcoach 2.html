// ─── SHARED COMPONENTS ───────────────────────────────────────────────────────
function Btn({onClick,children,cls="",disabled=false}) {
  return <button onClick={onClick} disabled={disabled} className={"transition-all active:scale-95 "+cls}>{children}</button>;
}

function WDelta({weights}) {
  if(!weights||weights.length<2) return null;
  const last=weights.at(-1).v, prev=weights.at(-2).v, d=(last-prev).toFixed(1);
  const up=d>0;
  return <span className={"text-xs font-bold "+(up?"text-red-400":"text-emerald-400")}>{up?"▲":"▼"} {Math.abs(d)}kg <span className="text-slate-500 font-normal">{last}kg</span></span>;
}

function MacroRow({p,c,f}) {
  const tot=p*4+c*4+f*9||1;
  return (
    <div>
      <div className="flex rounded-full overflow-hidden h-1.5 mb-1">
        <div style={{width:(p*4/tot*100)+"%"}} className="bg-violet-500"/>
        <div style={{width:(c*4/tot*100)+"%"}} className="bg-amber-500"/>
        <div style={{width:(f*9/tot*100)+"%"}} className="bg-pink-500"/>
      </div>
      <div className="flex gap-2 text-xs">
        <span className="text-violet-400">P{p}g</span>
        <span className="text-amber-400">K{c}g</span>
        <span className="text-pink-400">Y{f}g</span>
      </div>
    </div>
  );
}

function AttPct({att}) {
  if(!att||!att.length) return <span className="text-slate-500 text-xs">—</span>;
  const pct=Math.round(att.filter(Boolean).length/att.length*100);
  const col=pct>=80?"text-emerald-400":pct>=50?"text-amber-400":"text-red-400";
  return <span className={"font-bold text-sm "+col}>{pct}%</span>;
}

          </div>
          <div className="bg-slate-800/40 border border-slate-700/30 rounded-xl p-3">
            <div className="text-slate-400 text-xs font-semibold mb-2">Haftalik Degisim</div>
            <div className="grid grid-cols-2 gap-1.5">
              {MKEYS.map(k=>{const d=delta(k);if(!d)return null;const good=isGood(k,d);
                return <div key={k} className="flex items-center justify-between bg-slate-900/60 rounded-xl px-3 py-1.5">
                  <span className="text-slate-400 text-xs">{MLBL[k]}</span>
                  <span className={"text-xs font-bold "+(good?"text-emerald-400":good===false?"text-red-400":"text-amber-400")}>{parseFloat(d)>0?"+":""}{d}cm</span>
                </div>;
              })}
            </div>
          </div>
          {chartData.length>=2&&(
            <div className="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-3">
              <div className="text-slate-300 text-xs font-semibold mb-2">{MLBL[sel]} — cm</div>
              <svg width="100%" viewBox={"0 0 280 80"} className="overflow-visible">
                {(()=>{const vals=chartData.map(d=>d.v);const mn=Math.min(...vals)-1,mx=Math.max(...vals)+1,rng=mx-mn;
                  const px=(i)=>((i/(vals.length-1))*260+10);
                  const py=(v)=>(70-((v-mn)/rng)*60);
                  const pts=vals.map((v,i)=>px(i)+","+py(v)).join(" ");
                  const trend=vals.at(-1)<vals[0];
                  const col=trend?"#34d399":"#f87171";
                  return <>
                    <polyline points={pts} fill="none" stroke={col} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    {vals.map((v,i)=><circle key={i} cx={px(i)} cy={py(v)} r="3.5" fill={col}/>)}
                  </>;
                })()}
              </svg>
              <div className="flex justify-between mt-1">{chartData.map((d,i)=><span key={i} className="text-slate-600 text-xs">{fmtDate(d.date)}</span>)}</div>
            </div>
          )}
        </>
      )}
      {ms.length===0&&<div className="text-slate-500 text-sm text-center py-8">Olcu girilmemis.</div>}
    </div>
  );
}

              {editId===s.id&&<Btn onClick={()=>setEditId(null)} cls="text-slate-500 hover:text-slate-300 text-xs px-2 py-1 rounded-lg">X</Btn>}
            </div>

          {s.studentNote&&<div className="px-4 py-3 bg-emerald-950/20 border-b border-emerald-900/30"><div className="text-emerald-300 text-xs font-semibold mb-1">Ogrenciden:</div><p className="text-slate-300 text-sm">{s.studentNote}</p></div>}
          {editId===s.id?(
            <div className="p-3 space-y-2">
              <textarea rows={3} maxLength={MAX} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none resize-none" value={draft} onChange={e=>setDraft(e.target.value.slice(0,MAX))}/>
              <div className="flex justify-end"><span className={"text-xs "+(draft.length>=MAX?"text-red-400":draft.length>250?"text-amber-400":"text-slate-500")}>{draft.length}/{MAX}</span></div>
            </div>
          ):(
            <div className="px-4 py-3">{s.notes?<p className="text-slate-300 text-sm">{s.notes}</p>:<p className="text-slate-600 text-sm italic">Not eklenmemis...</p>}</div>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── COACH: NUTRITION TAB ────────────────────────────────────────────────────

  const [libCat,setLibCat]=useState("protein"); const [libQ,setLibQ]=useState("");
  const [customFoods,setCustomFoods]=useState({});
  const [showAddCustom,setShowAddCustom]=useState(false);
  const [nf,setNf]=useState({name:"",cal:"",p:"",c:"",f:"",cat:"protein"});
  const s=students.find(x=>x.id===sid);
  const target=s?{cal:s.calories,p:s.protein,c:s.carbs,f:s.fat}:null;

  const results=useMemo(()=>{
    const pool=cat==="all"?Object.entries(FOOD_DB).flatMap(([k,v])=>v.map(f=>({...f,cat:k}))):(FOOD_DB[cat]||[]).map(f=>({...f,cat}));
    const qq=q.toLowerCase();
    return (q?pool.filter(f=>f.n.toLowerCase().includes(qq)):pool).slice(0,40);

    const base=(FOOD_DB[libCat]||[]).map(f=>({...f,custom:false}));

        ))}
      </div>
      {sub==="plan"&&(
        <div className="space-y-3">
          <div className="flex gap-1.5 overflow-x-auto pb-1">{students.map(st=><Btn key={st.id} onClick={()=>setSid(st.id)} cls={"px-3 py-1.5 rounded-xl text-xs font-semibold whitespace-nowrap border "+(sid===st.id?"bg-violet-600 border-violet-500 text-white":"bg-slate-800 border-slate-700 text-slate-400")}>{st.name.split(" ")[0]}</Btn>)}</div>
          {target&&(
            <div className="bg-slate-800/60 border border-slate-700/40 rounded-2xl p-3 space-y-2">
              <div className="flex items-center justify-between"><span className="text-white font-black text-2xl">{Math.round(tots.cal)}</span><span className="text-slate-400 text-sm">/ {target.cal} kcal</span></div>
              <div className="grid grid-cols-3 gap-2">
                {[["Protein",tots.p,target.p,"bg-violet-500","text-violet-300"],["Karb",tots.c,target.c,"bg-amber-500","text-amber-300"],["Yag",tots.f,target.f,"bg-pink-500","text-pink-300"]].map(([l,v,tv,bar,col])=>(
                  <div key={l}><div className={"flex justify-between mb-1"}><span className={"text-xs "+col}>{l}</span><span className="text-white text-xs font-bold">{Math.round(v)}g</span></div>

                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

            </div>
            {student.supplements?.length>0&&(
              <div className="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-4 space-y-3">
                <div className="text-slate-300 font-bold text-sm">Supplement Programim</div>
                {student.supplements.map((s,i)=>(
                  <div key={i} className="flex items-start gap-3 bg-slate-900/40 rounded-xl p-3"><span className="text-2xl shrink-0">💊</span>
                    <div><div className="text-white font-semibold text-sm">{s.name}</div><div className="flex flex-wrap gap-x-3 text-xs mt-0.5"><span className="text-slate-400">{s.dose}</span><span className="text-violet-400">{s.timing}</span>{s.note&&<span className="text-slate-500">{s.note}</span>}</div></div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
        {tab==="measure"&&(
          <div className="space-y-4">
            <div className="text-violet-300 font-bold">Olculerim</div>
            <div className="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-4 space-y-3">
              <div className="text-slate-300 text-sm font-semibold">Olcu Gir (cm)</div>
              <div className="grid grid-cols-4 gap-2">{MKEYS.map(k=>(
                <div key={k}><div className="text-slate-400 text-xs mb-1">{MLBL[k]}</div><input type="number" placeholder="cm" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-white text-sm focus:outline-none text-center" value={entry[k]} onChange={e=>setEntry(p=>({...p,[k]:e.target.value}))}/></div>
              ))}</div>
              <Btn onClick={saveMeasurement} cls="w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-2.5 rounded-xl text-sm">Kaydet</Btn>
              {mSaved&&<div className="text-emerald-400 text-xs text-center font-semibold">Kaydedildi!</div>}
            </div>
            {lat&&<div className="space-y-2"><div className="text-slate-400 text-xs font-semibold">Son Olcum — {fmtDate(lat.date)}</div>
              <div className="grid grid-cols-4 gap-2">{MKEYS.map(k=>{const d=prv?(lat[k]-prv[k]).toFixed(1):null;const fat=["bel","kalca","boyun"];const good=d!==null?(fat.includes(k)?parseFloat(d)<0:parseFloat(d)>0):null;
                return <div key={k} className="bg-slate-800/60 border border-slate-700/50 rounded-xl p-2.5 text-center"><div className="text-slate-400 text-xs">{MLBL[k]}</div><div className="text-white font-black text-base">{lat[k]||"—"}</div>{d!==null&&<div className={"text-xs font-bold "+(good?"text-emerald-400":good===false?"text-red-400":"text-amber-400")}>{parseFloat(d)>0?"+":""}{d}</div>}</div>;
              })}</div>
            </div>}
            {ms.length===0&&<div className="text-slate-500 text-sm text-center py-6">Henuz olcu girilmemis.</div>}
          </div>
        )}
        {tab==="profile"&&(
          <div className="space-y-4">
            <div className="text-violet-300 font-bold">Profilim</div>
            <div className="bg-gradient-to-br from-violet-900/30 to-indigo-900/30 border border-violet-700/40 rounded-2xl p-4">
              <div className="flex items-center gap-3 mb-3"><div className="w-12 h-12 rounded-full bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center text-white font-black text-xl">{student.name[0]}</div><div><div className="text-white font-black text-base">{student.name}</div><div className="text-violet-300 text-sm">{student.goal}</div></div></div>
              <div className="grid grid-cols-3 gap-2 text-center">{[["Yas",student.age?student.age+"y":"—"],["Boy",student.height?student.height+"cm":"—"],["Kilo",student.weight?student.weight+"kg":"—"],["Boyun",student.neck?student.neck+"cm":"—"],["Bel",student.waist?student.waist+"cm":"—"],["BMI",(student.weight&&student.height)?(student.weight/((student.height/100)**2)).toFixed(1):"—"]].map(([l,v])=>(
                <div key={l} className="bg-slate-900/50 rounded-xl py-2"><div className="text-slate-500 text-xs">{l}</div><div className="text-white font-bold text-sm">{v}</div></div>
              ))}</div>
            </div>
            {student.notes&&<div className="bg-slate-800/60 border border-violet-900/40 rounded-2xl p-4"><div className="text-violet-300 font-bold text-sm mb-2">🦅 Kocunun Notu</div><p className="text-slate-300 text-sm">{student.notes}</p></div>}
            {student.flags?.length>0&&<div className="bg-red-950/40 border border-red-800/50 rounded-2xl p-3"><div className="text-red-300 text-xs font-semibold mb-2">Kocundan Uyarilar</div><div className="flex gap-1.5 flex-wrap">{student.flags.map((fl,i)=><span key={i} className="text-xs bg-red-900/60 border border-red-700/50 text-red-300 px-2 py-0.5 rounded-full">{fl}</span>)}</div></div>}
            <div className="bg-slate-800/60 border border-slate-700/50 rounded-2xl overflow-hidden">
              <div className="flex items-center justify-between px-4 py-3 bg-slate-800/80 border-b border-slate-700/50"><span className="text-emerald-400 font-bold text-sm">Kocuma Not Yaz</span></div>
              <div className="p-4 space-y-2">
                <textarea rows={4} maxLength={300} placeholder="Antrenman, hissettiklerin, sorularin..." className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none resize-none" value={sNote} onChange={e=>setSNote(e.target.value.slice(0,300))}/>
                <div className="flex items-center justify-between"><span className={"text-xs "+(sNote.length>=300?"text-red-400":sNote.length>250?"text-amber-400":"text-slate-600")}>{sNote.length}/300</span><Btn onClick={saveNote} disabled={!sNote.trim()} cls="bg-violet-600 hover:bg-violet-500 disabled:opacity-40 text-white text-xs font-bold px-4 py-2 rounded-xl">Gonder</Btn></div>
                {noteSaved&&<div className="text-emerald-400 text-xs text-center font-semibold">Iletildi!</div>}
              </div>
            </div>
            <div className="bg-slate-800/40 border border-slate-700/40 rounded-2xl p-3">
              <Btn onClick={()=>setShowPassChange(!showPassChange)} cls="text-slate-400 hover:text-white text-sm font-semibold w-full flex items-center justify-between">Sifremi Degistir <span>{showPassChange?"▲":"▼"}</span></Btn>
              {showPassChange&&<div className="mt-3 space-y-2">
                <input type="password" placeholder="Yeni sifre" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none" value={np} onChange={e=>setNp(e.target.value)}/>
                <input type="password" placeholder="Tekrar" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none" value={np2} onChange={e=>setNp2(e.target.value)}/>
                {pm&&<div className={"text-xs px-2 py-1 rounded-lg "+(pm==="Guncellendi!"?"text-emerald-400":"text-red-400")}>{pm}</div>}
                <Btn onClick={changePass} cls="w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-2 rounded-xl text-sm">Guncelle</Btn>
              </div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [students,setStudents]=useState(DEMO_STUDENTS);
  const [session,setSession]=useState(null);
  if(!session) return <Login students={students} onCoach={()=>setSession({role:"coach"})} onStudent={id=>setSession({role:"student",id})}/>;
  if(session.role==="coach") return <CoachPanel students={students} setStudents={setStudents} onLogout={()=>setSession(null)}/>;
  const stu=students.find(s=>s.id===session.id);
  if(!stu){setSession(null);return null;}
  return <StudentPanel student={stu} students={students} setStudents={setStudents} onLogout={()=>setSession(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
