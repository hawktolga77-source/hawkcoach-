function genId(){return Math.random().toString(36).slice(2,9);}
function genPass(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";return Array.from({length:8},()=>c[Math.floor(Math.random()*c.length)]).join("");}
function fmtDate(d){return d?.slice(5).replace("-","/")||"";}

// ─── SUPABASE FONKSİYONLARI ───────────────────────────────────────────────────
async function loadStudents(){
  const {data,error}=await sb.from("students").select("*").order("created_at");
  if(error){console.error(error);return [];}
  return data||[];
}
async function saveStudent(s){
  const row={name:s.name,goal:s.goal,calories:s.calories,protein:s.protein,carbs:s.carbs,fat:s.fat,water:s.water,weight:s.weight,height:s.height||0,age:s.age||0,neck:s.neck||0,waist:s.waist||0,program:s.program,password:s.password,notes:s.notes||"",student_note:s.studentNote||"",flags:s.flags||[],custom_program:s.customProgram||{},last_seen:s.lastSeen||new Date().toISOString().slice(0,10),attendance:s.attendance||[]};
  if(s.id&&s.id.length>10){const {data}=await sb.from("students").update(row).eq("id",s.id).select().single();return data;}
  else{const {data}=await sb.from("students").insert(row).select().single();return data;}
}
async function deleteStudent(id){await sb.from("students").delete().eq("id",id);}
async function loadWeights(sid){const {data}=await sb.from("weight_logs").select("*").eq("student_id",sid).order("date");return(data||[]).map(r=>({date:r.date,v:r.value}));}
async function addWeight(sid,v){await sb.from("weight_logs").insert({student_id:sid,value:v,date:new Date().toISOString().slice(0,10)});}
async function loadMeasurements(sid){const {data}=await sb.from("measurements").select("*").eq("student_id",sid).order("date");return data||[];}
async function addMeasurement(sid,m){await sb.from("measurements").insert({student_id:sid,...m,date:new Date().toISOString().slice(0,10)});}
async function loadWorkoutLogs(sid){const {data}=await sb.from("workout_logs").select("*").eq("student_id",sid).order("date");return(data||[]).map(r=>({date:r.date,ex:r.exercise,w:r.weight_kg,r:r.reps,s:r.sets}));}
async function addWorkoutLog(sid,log){await sb.from("workout_logs").insert({student_id:sid,exercise:log.ex,weight_kg:log.w,reps:log.r,sets:log.s,date:new Date().toISOString().slice(0,10)});}
async function loadSupplements(sid){const {data}=await sb.from("supplements").select("*").eq("student_id",sid);return data||[];}
async function addSupplement(sid,sup){const {data}=await sb.from("supplements").insert({student_id:sid,name:sup.name,dose:sup.dose,timing:sup.timing,note:sup.note||""}).select().single();return data;}
async function deleteSupplement(id){await sb.from("supplements").delete().eq("id",id);}

function Btn({onClick,children,cls="",disabled=false}){
  return <button onClick={onClick} disabled={disabled} className={"transition-all active:scale-95 "+cls}>{children}</button>;
}
function MacroRow({p,c,f}){
  const tot=p*4+c*4+f*9||1;
  return(<div><div className="flex rounded-full overflow-hidden h-1.5 mb-1"><div style={{width:(p*4/tot*100)+"%"}} className="bg-violet-500"/><div style={{width:(c*4/tot*100)+"%"}} className="bg-amber-500"/><div style={{width:(f*9/tot*100)+"%"}} className="bg-pink-500"/></div><div className="flex gap-2 text-xs"><span className="text-violet-400">P{p}g</span><span className="text-amber-400">K{c}g</span><span className="text-pink-400">Y{f}g</span></div></div>);
}

// ─── GİRİŞ ─────────────────────────────────────────────────────────────────────
function Login({onCoach,onStudent}){
  const [mode,setMode]=useState("pick");
  const [user,setUser]=useState(""); const [pass,setPass]=useState(""); const [err,setErr]=useState(""); const [loading,setLoading]=useState(false);
  async function tryLogin(){
    setErr(""); setLoading(true);
    if(mode==="coach"){
      if(user===COACH.user&&pass===COACH.pass){onCoach();}else setErr("Hatali giris.");
      setLoading(false);
    } else {
      const {data}=await sb.from("students").select("*");
      setLoading(false);
      const found=data&&data.find(s=>s.name.trim().toLowerCase()===user.trim().toLowerCase()&&s.password.trim()===pass.trim());if(found){onStudent(found.id);}
      else setErr("Ad soyad veya sifre hatali.");
    }
  }
  return(
    <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center px-6">
      <div className="mb-8 text-center"><div className="text-5xl mb-2">🦅</div><div className="text-2xl font-black"><span className="text-violet-300">Hawk</span><span className="text-white">Coach</span><span className="text-violet-400 text-lg"> Pro</span></div><div className="text-slate-500 text-sm mt-1">Profesyonel Kocluk Sistemi</div></div>
      {mode==="pick"?(
        <div className="w-full max-w-xs space-y-3">
          <Btn onClick={()=>{setMode("coach");setErr("");}} cls="w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 text-base">🦅 Koc Girisi</Btn>
          <Btn onClick={()=>{setMode("student");setErr("");}} cls="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 text-base">👤 Ogrenci Girisi</Btn>
        </div>
      ):(
        <div className="w-full max-w-xs space-y-3">
          <Btn onClick={()=>setMode("pick")} cls="text-slate-400 text-sm hover:text-white">geri</Btn>
          <div className="bg-slate-800 border border-slate-700 rounded-2xl p-4 space-y-3">
            <div className="text-white font-bold text-sm">{mode==="coach"?"🦅 Koc":"👤 Ogrenci"} Girisi</div>
            <input className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none focus:border-violet-500" placeholder={mode==="coach"?"Kullanici adi":"Ad Soyad"} value={user} onChange={e=>setUser(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryLogin()}/>
            <input type="password" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none focus:border-violet-500" placeholder="Sifre" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryLogin()}/>
            {err&&<div className="text-red-400 text-xs bg-red-900/30 border border-red-800/50 rounded-lg px-3 py-2">{err}</div>}
            <Btn onClick={tryLogin} disabled={loading||!user||!pass} cls="w-full bg-violet-600 hover:bg-violet-500 disabled:opacity-40 text-white font-bold py-2.5 rounded-xl text-sm">{loading?"Yukleniyor...":"Giris Yap"}</Btn>
          </div>
          {mode==="student"&&<p className="text-slate-600 text-xs text-center">Sifrenizi kocunuzdan aliniz.</p>}
        </div>
      )}
    </div>
  );
}

// ─── KOÇ PANELİ ───────────────────────────────────────────────────────────────
function CoachPanel({onLogout}){
  const [students,setStudents]=useState([]);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("students");
  const [selId,setSelId]=useState(null);

  useEffect(()=>{
    loadStudents().then(data=>{setStudents(data);setLoading(false);});
  },[]);

  async function addStudent(f){
    const pass=genPass();
    const newS={name:f.name,goal:f.goal,program:f.program,calories:2000,protein:150,carbs:200,fat:65,water:3,weight:parseFloat(f.weight)||0,height:parseFloat(f.height)||0,age:parseInt(f.age)||0,neck:parseFloat(f.neck)||0,waist:parseFloat(f.waist)||0,password:pass,notes:"",studentNote:"",flags:[],customProgram:{},lastSeen:new Date().toISOString().slice(0,10),attendance:[]};
    const saved=await saveStudent(newS);
    if(saved){setStudents(p=>[...p,saved]);}
    return pass;
  }

  async function updateStudent(s){
    const saved=await saveStudent({...s,studentNote:s.student_note||s.studentNote||""});
    if(saved)setStudents(p=>p.map(x=>x.id===s.id?saved:x));
  }

  async function removeStudent(id){
    await deleteStudent(id);
    setStudents(p=>p.filter(x=>x.id!==id));
  }

  const sel=students.find(s=>s.id===selId);
  const flags=students.filter(s=>(s.flags||[]).length>0).length;

  if(loading) return <div className="min-h-screen bg-slate-950 flex items-center justify-center"><div className="text-violet-300 text-lg font-bold">Yukleniyor...</div></div>;

  const TABS=[["students","Ogrenciler"],["progress","Ilerleme"],["measurements","Olculer"],["notes","Notlar"],["supplements","Suppler"]];
  return(
    <div className="min-h-screen bg-slate-950">
      <div className="bg-slate-900/90 border-b border-slate-800 px-4 py-3 flex items-center justify-between sticky top-0 z-20">
        <div className="flex items-center gap-2"><span className="text-xl">🦅</span><span className="text-violet-300 font-black">Hawk</span><span className="text-white font-black">Coach</span><span className="text-slate-400 text-xs ml-1"> Pro</span></div>
        <div className="flex items-center gap-2">{flags>0&&<span className="text-red-400 text-xs bg-red-900/50 border border-red-700/50 px-2 py-1 rounded-full">🚩{flags}</span>}<Btn onClick={onLogout} cls="bg-slate-800 border border-slate-700 text-slate-300 text-xs px-3 py-1.5 rounded-xl">Cikis</Btn></div>
      </div>
      <div className="flex gap-1 overflow-x-auto px-3 py-2 bg-slate-900/60 border-b border-slate-800 sticky top-14 z-10">
        {TABS.map(([id,lbl])=><Btn key={id} onClick={()=>{setTab(id);setSelId(null);}} cls={"px-3 py-1.5 rounded-xl text-xs font-semibold whitespace-nowrap "+(tab===id&&!selId?"bg-violet-600 text-white":"bg-slate-800 text-slate-400 hover:text-white")}>{lbl}</Btn>)}
      </div>
      <div className="px-4 py-4 max-w-2xl mx-auto pb-10">
        {selId&&sel?<StudentDetail student={sel} onBack={()=>setSelId(null)} onUpdate={updateStudent}/>:(
          <>
            {tab==="students"&&<CoachStudentsTab students={students} onSelect={setSelId} onAdd={addStudent} onDelete={removeStudent}/>}
            {tab==="progress"&&<CoachProgressTab students={students}/>}
            {tab==="measurements"&&<CoachMeasurementsTab students={students}/>}
            {tab==="notes"&&<CoachNotesTab students={students} onUpdate={updateStudent}/>}
            {tab==="supplements"&&<CoachSupplementsTab students={students} onUpdate={updateStudent}/>}
          </>
        )}
      </div>
    </div>
  );
}

function CoachMeasurementsTab({students}){
  const [sid,setSid]=useState(students[0]?.id||"");
  const [ms,setMs]=useState([]);
  const [sel,setSel]=useState("bel");
  useEffect(()=>{if(sid)loadMeasurements(sid).then(setMs);},[sid]);
  const lat=ms.at(-1); const prv=ms.at(-2);
  function delta(k){if(!lat||!prv)return null;return(lat[k]-prv[k]).toFixed(1);}
  function isGood(k,d){if(d===null)return null;return ["bel","kalca","boyun"].includes(k)?parseFloat(d)<0:parseFloat(d)>0;}
  const chartData=ms.map(m=>({date:m.date,v:m[sel]}));
  return(
    <div className="space-y-4">
      <div className="text-violet-300 font-bold text-base">Olcu Takibi</div>
      <div className="flex gap-1.5 overflow-x-auto pb-1">{students.map(st=><Btn key={st.id} onClick={()=>setSid(st.id)} cls={"px-3 py-1.5 rounded-xl text-xs font-semibold whitespace-nowrap border "+(sid===st.id?"bg-violet-600 border-violet-500 text-white":"bg-slate-800 border-slate-700 text-slate-400")}>{st.name.split(" ")[0]}</Btn>)}</div>
      {lat&&(<>
        <div className="grid grid-cols-4 gap-2">{MKEYS.map(k=>{const d=delta(k);const good=isGood(k,d);return(<Btn key={k} onClick={()=>setSel(k)} cls={"rounded-2xl p-2 text-center border "+(sel===k?"bg-slate-700 border-violet-500":"bg-slate-800/60 border-slate-700/50")}><div className="text-slate-400 text-xs">{MLBL[k]}</div><div className="text-white font-black text-base">{lat[k]||"—"}</div>{d!==null&&<div className={"text-xs font-bold "+(good?"text-emerald-400":good===false?"text-red-400":"text-amber-400")}>{parseFloat(d)>0?"+":""}{d}</div>}</Btn>);})}</div>
        {chartData.length>=2&&<div className="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-3">
          <div className="text-slate-300 text-xs font-semibold mb-2">{MLBL[sel]} — cm</div>
          <svg width="100%" viewBox={"0 0 280 80"} className="overflow-visible">{(()=>{
            const vals=chartData.map(d=>d.v);
            const mn=Math.min(...vals)-1,mx=Math.max(...vals)+1,rng=mx-mn||1;
            const pts=vals.map((v,i)=>((i/(vals.length-1))*260+10)+","+(70-((v-mn)/rng)*60)).join(" ");
            const col=vals.at(-1)<=vals[0]?"#34d399":"#f87171";
            return <>
              <polyline points={pts} fill="none" stroke={col} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              {vals.map((v,i)=><circle key={i} cx={(i/(vals.length-1))*260+10} cy={70-((v-mn)/rng)*60} r="3.5" fill={col}/>)}
            </>;
          })()}</svg>
          <div className="flex justify-between mt-1">{chartData.map((d,i)=><span key={i} className="text-slate-600 text-xs">{fmtDate(d.date)}</span>)}</div>
        </div>}
      </>)}
      {ms.length===0&&<div className="text-slate-500 text-sm text-center py-6">Olcu girilmemis.</div>}
    </div>
  );
}

        <Btn onClick={save} disabled={saving} cls="w-full bg-violet-600 hover:bg-violet-500 disabled:opacity-40 text-white font-bold py-2 rounded-xl text-sm">{saving?"Kaydediliyor...":"Kaydet"}</Btn>
      </div>}
      {sec==="flags"&&<div className="space-y-3"><div className="flex gap-1.5 flex-wrap">{(local.flags||[]).map((fl,i)=><div key={i} className="flex items-center gap-1 bg-red-900/40 border border-red-700/50 rounded-full px-2.5 py-1"><span className="text-red-300 text-xs">{fl}</span><Btn onClick={()=>setLocal(p=>({...p,flags:p.flags.filter((_,j)=>j!==i)}))} cls="text-red-500 text-sm">x</Btn></div>)}{!(local.flags||[]).length&&<span className="text-slate-500 text-sm">Bayrak yok</span>}</div>
        <div className="flex gap-2"><input className="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none" placeholder="Yeni bayrak..." value={flagInput} onChange={e=>setFlagInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&flagInput.trim()&&(setLocal(p=>({...p,flags:[...(p.flags||[]),flagInput]})),setFlagInput(""))}/><Btn onClick={()=>flagInput.trim()&&(setLocal(p=>({...p,flags:[...(p.flags||[]),flagInput]})),setFlagInput(""))} cls="bg-red-700 hover:bg-red-600 text-white font-bold px-3 py-2 rounded-xl">+</Btn></div>
        <div className="flex gap-1.5 flex-wrap">{["Antrenman Kacirdi","Kilo Artisi","Sakatlık","Motivasyon Dusuk","Diyet Uymuyor"].map(fl=><Btn key={fl} onClick={()=>setLocal(p=>({...p,flags:[...(p.flags||[]),fl]}))} cls="bg-slate-700 text-slate-300 text-xs px-2 py-1 rounded-lg">+ {fl}</Btn>)}</div>
        <Btn onClick={save} disabled={saving} cls="w-full bg-violet-600 hover:bg-violet-500 disabled:opacity-40 text-white font-bold py-2 rounded-xl text-sm">{saving?"Kaydediliyor...":"Kaydet"}</Btn>
      </div>}
    </div>
  );
}

// ─── ÖĞRENCİ PANELİ ──────────────────────────────────────────────────────────
function StudentPanel({studentId,onLogout}){
  const [student,setStudent]=useState(null);
  const [weights,setWeights]=useState([]);
  const [ms,setMs]=useState([]);
  const [logs,setLogs]=useState([]);
  const [sups,setSups]=useState([]);
  const [tab,setTab]=useState("workout");
  const [loading,setLoading]=useState(true);
  const [entry,setEntry]=useState(Object.fromEntries(MKEYS.map(k=>[k,""])));
  const [mSaved,setMSaved]=useState(false);
  const [waterMl,setWaterMl]=useState(0);
  const [wStep,setWStep]=useState(250);
  const [setLogs2,setSetLogs2]=useState({});
  const [inputs,setInputs]=useState({});
  const [savedEx,setSavedEx]=useState({});
  const [sNote,setSNote]=useState("");
  const [noteSaved,setNoteSaved]=useState(false);
  const [showPassChange,setShowPassChange]=useState(false);
  const [np,setNp]=useState(""); const [np2,setNp2]=useState(""); const [pm,setPm]=useState("");

  useEffect(()=>{
    async function init(){
      const {data}=await sb.from("students").select("*").eq("id",studentId).single();
      if(data){setStudent(data);setSNote(data.student_note||"");}
      const [w,m,l,s]=await Promise.all([loadWeights(studentId),loadMeasurements(studentId),loadWorkoutLogs(studentId),loadSupplements(studentId)]);
      setWeights(w);setMs(m);setLogs(l);setSups(s);setLoading(false);
    }
    init();
  },[studentId]);

  if(loading||!student)return<div className="min-h-screen bg-slate-950 flex items-center justify-center"><div className="text-violet-300 font-bold">Yukleniyor...</div></div>;

  const prog=PROGRAMS[student.program];
  const workDays=prog?prog.days.filter(d=>d.ex.length>0):[];
  const [selDay,setSelDay]=useState(workDays[0]?.id||"");
  const day=workDays.find(d=>d.id===selDay)||workDays[0];
  const lat=ms.at(-1); const prv=ms.at(-2);
  const wGoal=(student.water||3)*1000;
  const wPct=Math.min(100,Math.round(waterMl/wGoal*100));

  async function addSet(did,exName){
    const inp=inputs[exName]||{w:"",r:""};
    if(!inp.w&&!inp.r)return;
    const newSet={w:parseFloat(inp.w)||0,r:parseInt(inp.r)||0};
    setSetLogs2(p=>{const d={...(p[did]||{})};d[exName]=[...(d[exName]||[]),newSet];return{...p,[did]:d};});
    setInputs(p=>({...p,[exName]:{w:"",r:""}}));
    setSavedEx(p=>({...p,[exName]:true}));setTimeout(()=>setSavedEx(p=>({...p,[exName]:false})),1200);
    await addWorkoutLog(studentId,{ex:exName,w:newSet.w,r:newSet.r,s:1});
    loadWorkoutLogs(studentId).then(setLogs);
  }

  async function saveMeasurement(){
    if(!Object.values(entry).some(v=>v))return;
    const m=Object.fromEntries(MKEYS.map(k=>[k,parseFloat(entry[k])||0]));
    await addMeasurement(studentId,m);
    loadMeasurements(studentId).then(setMs);
    setEntry(Object.fromEntries(MKEYS.map(k=>[k,""])));
    setMSaved(true);setTimeout(()=>setMSaved(false),2500);
  }

  async function saveNote(){
    await sb.from("students").update({student_note:sNote}).eq("id",studentId);
    setNoteSaved(true);setTimeout(()=>setNoteSaved(false),2000);
  }

  async function changePass(){
    if(np.length<4){setPm("En az 4 karakter.");return;}
    if(np!==np2){setPm("Sifreler eslesmedi.");return;}
    await sb.from("students").update({password:np}).eq("id",studentId);
    setPm("Guncellendi!");setNp("");setNp2("");setTimeout(()=>{setPm("");setShowPassChange(false);},2000);
  }

  const TABS=[["workout","Antrenman"],["nutrition","Beslenme"],["measure","Olculer"],["profile","Profil"]];
  return(
    <div className="min-h-screen bg-slate-950">
      <div className="bg-slate-900/90 border-b border-slate-800 px-4 py-3 flex items-center justify-between sticky top-0 z-20">
        <div className="flex items-center gap-2"><div className="w-8 h-8 rounded-full bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center text-white font-black text-sm">{student.name[0]}</div><div><div className="text-white font-bold text-sm">{student.name}</div><div className="text-violet-400 text-xs">{student.goal}</div></div></div>
        <Btn onClick={onLogout} cls="bg-slate-800 border border-slate-700 text-slate-300 text-xs px-3 py-1.5 rounded-xl">Cikis</Btn>
      </div>
      <div className="flex gap-1 px-3 py-2 bg-slate-900/60 border-b border-slate-800 sticky top-14 z-10">
        {TABS.map(([id,lbl])=><Btn key={id} onClick={()=>setTab(id)} cls={"flex-1 py-1.5 rounded-xl text-xs font-semibold text-center "+(tab===id?"bg-violet-600 text-white":"bg-slate-800 text-slate-400")}>{lbl}</Btn>)}
      </div>
      <div className="px-4 py-4 max-w-2xl mx-auto pb-10 space-y-4">
        {tab==="workout"&&<div className="space-y-3">
          <div className="text-violet-300 font-bold">{prog?.name}</div>
          <div className="flex gap-1.5 overflow-x-auto pb-1">{workDays.map(d=>{const done=Object.keys(setLogs2[d.id]||{}).length>0;return<Btn key={d.id} onClick={()=>setSelDay(d.id)} cls={"relative px-3 py-1.5 rounded-xl text-xs font-semibold whitespace-nowrap border shrink-0 "+(selDay===d.id?"bg-violet-600 border-violet-500 text-white":"bg-slate-800 border-slate-700 text-slate-400")}>{d.label}{done&&<span className="absolute -top-1 -right-1 w-2 h-2 bg-emerald-400 rounded-full"/>}</Btn>;})}</div>
          {day&&day.ex.map((ex,i)=>{
            const ck=day.id+"-"+i;const cu=(student.custom_program||{})[ck]||{};
            const name=cu.name||ex.n;const sets=cu.sets||ex.s;
            const logged=(setLogs2[day.id]?.[name]||[]);const inp=inputs[name]||{w:"",r:""};const saved=savedEx[name];
            return<div key={i} className="bg-slate-800/60 border border-slate-700/50 rounded-2xl overflow-hidden">
              <div className="flex items-center justify-between px-3 py-2.5 bg-slate-800/90"><div><span className="text-white font-bold text-sm">{name}</span><span className="text-violet-400 text-xs ml-2 bg-violet-900/40 px-1.5 py-0.5 rounded-lg">{sets}</span></div>{logged.length>0&&<span className="text-emerald-400 text-xs font-semibold">{logged.length} set</span>}</div>
              {logged.length>0&&<div className="px-3 pt-2 pb-1 flex flex-wrap gap-1.5">{logged.map((s,si)=><div key={si} className="flex items-center gap-1 bg-slate-900/70 border border-slate-700/50 rounded-lg px-2 py-1"><span className="text-slate-500 text-xs">S{si+1}:</span><span className="text-white text-xs font-bold">{s.w}kg</span><span className="text-slate-500 text-xs">x</span><span className="text-violet-300 text-xs font-bold">{s.r}</span><Btn onClick={()=>setSetLogs2(p=>{const d={...p[day.id]};d[name]=d[name].filter((_,j)=>j!==si);return{...p,[day.id]:d};})} cls="text-slate-600 hover:text-red-400 text-xs ml-0.5">x</Btn></div>)}</div>}
              <div className="flex items-center gap-2 px-3 pb-3 pt-1">
                <input type="number" placeholder="kg" className="w-20 bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-white text-sm focus:outline-none text-center" value={inp.w} onChange={e=>setInputs(p=>({...p,[name]:{...p[name]||{},w:e.target.value}}))} onKeyDown={e=>e.key==="Enter"&&addSet(day.id,name)}/>
                <span className="text-slate-600">x</span>
                <input type="number" placeholder="tekrar" className="w-20 bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-white text-sm focus:outline-none text-center" value={inp.r} onChange={e=>setInputs(p=>({...p,[name]:{...p[name]||{},r:e.target.value}}))} onKeyDown={e=>e.key==="Enter"&&addSet(day.id,name)}/>
                <Btn onClick={()=>addSet(day.id,name)} cls={"flex-1 font-bold py-2 rounded-xl text-sm "+(saved?"bg-emerald-600 text-white":"bg-violet-600 hover:bg-violet-500 text-white")}>{saved?"OK":"+ Set"}</Btn>
              </div>
            </div>;
          })}
          {student.notes&&<div className="bg-slate-800/40 border border-violet-900/40 rounded-xl px-3 py-2.5 flex gap-2"><span className="text-violet-400 shrink-0">🦅</span><p className="text-slate-300 text-xs">{student.notes}</p></div>}
        </div>}
        {tab==="nutrition"&&<div className="space-y-4">
          <div className="text-violet-300 font-bold">Beslenme Hedefim</div>
          <div className="bg-gradient-to-br from-violet-900/30 to-indigo-900/30 border border-violet-700/40 rounded-2xl p-4 text-center"><div className="text-slate-400 text-sm">Gunluk Kalori</div><div className="text-5xl font-black text-white mt-1">{student.calories}</div><div className="text-slate-500 text-sm">kcal</div></div>
          <MacroRow p={student.protein||0} c={student.carbs||0} f={student.fat||0}/>
          <div className="grid grid-cols-3 gap-2">{[["Protein",student.protein,student.protein*4,"bg-violet-500","border-violet-700/40","text-violet-300"],["Karbonhidrat",student.carbs,student.carbs*4,"bg-amber-500","border-amber-700/40","text-amber-300"],["Yag",student.fat,student.fat*9,"bg-pink-500","border-pink-700/40","text-pink-300"]].map(([l,v,kcal,bar,brd,col])=><div key={l} className={"bg-slate-800/60 border rounded-2xl p-3 text-center "+brd}><div className={"w-2 h-2 rounded-full mx-auto mb-1 "+bar}/><div className={"font-black text-xl "+col}>{v}<span className="text-slate-500 text-xs font-normal">g</span></div><div className="text-slate-500 text-xs">{l}</div><div className="text-slate-600 text-xs">{kcal}kcal</div></div>)}</div>
          <div className="bg-blue-950/40 border border-blue-800/50 rounded-2xl p-4 space-y-3">
            <div className="flex items-center justify-between"><div className="flex items-center gap-2"><span className="text-2xl">💧</span><span className="text-blue-300 font-bold text-sm">Su Takibi</span></div><div><span className="text-blue-200 font-black text-xl">{waterMl}</span><span className="text-blue-400 text-sm">/{wGoal}ml</span></div></div>
            <div className="h-3 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-blue-500 to-cyan-400 rounded-full transition-all" style={{width:wPct+"%"}}/></div>
            <div className="flex items-center justify-between"><span className={"text-xs font-bold "+(wPct>=100?"text-emerald-400":wPct>=70?"text-blue-400":"text-slate-500")}>{wPct>=100?"Hedef tamamlandi!":wPct+"%"}</span><Btn onClick={()=>setWaterMl(0)} cls="text-slate-600 hover:text-red-400 text-xs">Sifirla</Btn></div>
            <div className="flex gap-2 flex-wrap">{[150,200,250,300,500].map(ml=><Btn key={ml} onClick={()=>setWaterMl(p=>Math.min(p+ml,wGoal*1.5))} cls="bg-blue-800/50 hover:bg-blue-700/60 border border-blue-700/50 text-blue-200 text-xs font-bold px-3 py-2 rounded-xl">+{ml}ml</Btn>)}</div>
            <div className="flex gap-2"><Btn onClick={()=>setWaterMl(p=>Math.max(0,p-wStep))} cls="w-10 h-10 bg-slate-700 hover:bg-slate-600 text-white font-black text-lg rounded-xl flex items-center justify-center">-</Btn><select className="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-2 text-white text-xs focus:outline-none" value={wStep} onChange={e=>setWStep(parseInt(e.target.value))}>{[100,150,200,250,300,500].map(ml=><option key={ml} value={ml}>{ml}ml</option>)}</select><Btn onClick={()=>setWaterMl(p=>Math.min(p+wStep,wGoal*1.5))} cls="w-10 h-10 bg-blue-600 hover:bg-blue-500 text-white font-black text-lg rounded-xl flex items-center justify-center">+</Btn></div>
          </div>
          {sups.length>0&&<div className="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-4 space-y-3"><div className="text-slate-300 font-bold text-sm">Supplement Programim</div>{sups.map((s,i)=><div key={i} className="flex items-start gap-3 bg-slate-900/40 rounded-xl p-3"><span className="text-2xl shrink-0">💊</span><div><div className="text-white font-semibold text-sm">{s.name}</div><div className="flex flex-wrap gap-x-3 text-xs mt-0.5"><span className="text-slate-400">{s.dose}</span><span className="text-violet-400">{s.timing}</span>{s.note&&<span className="text-slate-500">{s.note}</span>}</div></div></div>)}</div>}
        </div>}
        {tab==="measure"&&<div className="space-y-4">
          <div className="text-violet-300 font-bold">Olculerim</div>
          <div className="bg-slate-800/60 border border-slate-700/50 rounded-2xl p-4 space-y-3">
            <div className="text-slate-300 text-sm font-semibold">Olcu Gir (cm)</div>
            <div className="grid grid-cols-4 gap-2">{MKEYS.map(k=><div key={k}><div className="text-slate-400 text-xs mb-1">{MLBL[k]}</div><input type="number" placeholder="cm" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-white text-sm focus:outline-none text-center" value={entry[k]} onChange={e=>setEntry(p=>({...p,[k]:e.target.value}))}/></div>)}</div>
            <Btn onClick={saveMeasurement} cls="w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-2.5 rounded-xl text-sm">Kaydet</Btn>
            {mSaved&&<div className="text-emerald-400 text-xs text-center font-semibold">Kaydedildi!</div>}
          </div>
          {lat&&<div className="space-y-2"><div className="text-slate-400 text-xs font-semibold">Son Olcum — {fmtDate(lat.date)}</div><div className="grid grid-cols-4 gap-2">{MKEYS.map(k=>{const d=prv?(lat[k]-prv[k]).toFixed(1):null;const fat=["bel","kalca","boyun"];const good=d!==null?(fat.includes(k)?parseFloat(d)<0:parseFloat(d)>0):null;return<div key={k} className="bg-slate-800/60 border border-slate-700/50 rounded-xl p-2.5 text-center"><div className="text-slate-400 text-xs">{MLBL[k]}</div><div className="text-white font-black text-base">{lat[k]||"—"}</div>{d!==null&&<div className={"text-xs font-bold "+(good?"text-emerald-400":good===false?"text-red-400":"text-amber-400")}>{parseFloat(d)>0?"+":""}{d}</div>}</div>;})}</div></div>}
          {ms.length===0&&<div className="text-slate-500 text-sm text-center py-6">Olcu girilmemis.</div>}
        </div>}
        {tab==="profile"&&<div className="space-y-4">
          <div className="text-violet-300 font-bold">Profilim</div>
          <div className="bg-gradient-to-br from-violet-900/30 to-indigo-900/30 border border-violet-700/40 rounded-2xl p-4">
            <div className="flex items-center gap-3 mb-3"><div className="w-12 h-12 rounded-full bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center text-white font-black text-xl">{student.name[0]}</div><div><div className="text-white font-black text-base">{student.name}</div><div className="text-violet-300 text-sm">{student.goal}</div></div></div>
            <div className="grid grid-cols-3 gap-2 text-center">{[["Yas",student.age?student.age+"y":"—"],["Boy",student.height?student.height+"cm":"—"],["Kilo",student.weight?student.weight+"kg":"—"],["Boyun",student.neck?student.neck+"cm":"—"],["Bel",student.waist?student.waist+"cm":"—"],["BMI",(student.weight&&student.height)?(student.weight/((student.height/100)**2)).toFixed(1):"—"]].map(([l,v])=><div key={l} className="bg-slate-900/50 rounded-xl py-2"><div className="text-slate-500 text-xs">{l}</div><div className="text-white font-bold text-sm">{v}</div></div>)}</div>
          </div>
          {student.notes&&<div className="bg-slate-800/60 border border-violet-900/40 rounded-2xl p-4"><div className="text-violet-300 font-bold text-sm mb-2">🦅 Kocunun Notu</div><p className="text-slate-300 text-sm">{student.notes}</p></div>}
          {(student.flags||[]).length>0&&<div className="bg-red-950/40 border border-red-800/50 rounded-2xl p-3"><div className="text-red-300 text-xs font-semibold mb-2">Uyarilar</div><div className="flex gap-1.5 flex-wrap">{(student.flags||[]).map((fl,i)=><span key={i} className="text-xs bg-red-900/60 border border-red-700/50 text-red-300 px-2 py-0.5 rounded-full">{fl}</span>)}</div></div>}
          <div className="bg-slate-800/60 border border-slate-700/50 rounded-2xl overflow-hidden">
            <div className="px-4 py-3 bg-slate-800/80 border-b border-slate-700/50"><span className="text-emerald-400 font-bold text-sm">✉️ Kocuma Not Yaz</span></div>
            <div className="p-4 space-y-2">
              <textarea rows={4} maxLength={300} placeholder="Antrenman, hissettiklerin, sorularin..." className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none resize-none" value={sNote} onChange={e=>setSNote(e.target.value.slice(0,300))}/>
              <div className="flex items-center justify-between"><span className={"text-xs "+(sNote.length>=300?"text-red-400":sNote.length>250?"text-amber-400":"text-slate-600")}>{sNote.length}/300</span><Btn onClick={saveNote} disabled={!sNote.trim()} cls="bg-violet-600 hover:bg-violet-500 disabled:opacity-40 text-white text-xs font-bold px-4 py-2 rounded-xl">Gonder</Btn></div>
              {noteSaved&&<div className="text-emerald-400 text-xs text-center font-semibold">Iletildi!</div>}
            </div>
          </div>
          <div className="bg-slate-800/40 border border-slate-700/40 rounded-2xl p-3">
            <Btn onClick={()=>setShowPassChange(!showPassChange)} cls="text-slate-400 hover:text-white text-sm font-semibold w-full flex items-center justify-between">Sifremi Degistir <span>{showPassChange?"▲":"▼"}</span></Btn>
            {showPassChange&&<div className="mt-3 space-y-2">
              <input type="password" placeholder="Yeni sifre" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none" value={np} onChange={e=>setNp(e.target.value)}/>
              <input type="password" placeholder="Tekrar" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none" value={np2} onChange={e=>setNp2(e.target.value)}/>
              {pm&&<div className={"text-xs px-2 py-1 rounded-lg "+(pm==="Guncellendi!"?"text-emerald-400":"text-red-400")}>{pm}</div>}
              <Btn onClick={changePass} cls="w-full bg-violet-600 hover:bg-violet-500 text-white font-bold py-2 rounded-xl text-sm">Guncelle</Btn>
            </div>}
          </div>
        </div>}
      </div>
    </div>
  );
}

// ─── ANA UYGULAMA ─────────────────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  if(!session)return<Login onCoach={()=>setSession({role:"coach"})} onStudent={id=>setSession({role:"student",id})}/>;
  if(session.role==="coach")return<CoachPanel onLogout={()=>setSession(null)}/>;
  return<StudentPanel studentId={session.id} onLogout={()=>setSession(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
